<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artist Organizer</title>
  <!-- Emoji favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎸</text></svg>">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="importmap">
    {
      "scopes": {
        "./js/": {
          "./config.js": "./config.js?v=5.0.1",
          "./auth.js": "./auth.js?v=5.0.1",
          "./utils.js": "./utils.js?v=5.0.1",
          "./spotify-api.js": "./spotify-api.js?v=5.0.1",
          "./youtube-api.js": "./youtube-api.js?v=5.0.1",
          "./app.js": "./app.js?v=5.0.1"
        }
      }
    }
  </script>
  <script type="module">
    // Cache busting: keep in sync with importmap version suffix above
    const VERSION = '5.0.1';
    
    const { SpotifyOrganizer } = await import(`./js/app.js?v=${VERSION}`);

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(SpotifyOrganizer));
  </script>
</body>
</html>
