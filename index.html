<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artist Organizer</title>
  <!-- Emoji favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎸</text></svg>">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
    DEPLOY CHECKLIST — bump on every release:
      1. APP_CACHE_VERSION below
      2. APP_VERSION in js/config.js (UI label, e.g. 'v5.0.1')
    When adding a new js/ module, add its filename to JS_MODULES so it is cache-busted.
  -->
  <script>
    const APP_CACHE_VERSION = '5.0.2';

    const JS_MODULES = [
      'config.js',
      'utils.js',
      'auth.js',
      'spotify-api.js',
      'youtube-api.js',
      'app.js',
    ];

    const scopeMap = Object.fromEntries(
      JS_MODULES.map(name => [`./${name}`, `./${name}?v=${APP_CACHE_VERSION}`])
    );

    const importMapEl = document.createElement('script');
    importMapEl.type = 'importmap';
    importMapEl.textContent = JSON.stringify({ scopes: { './js/': scopeMap } });
    document.head.appendChild(importMapEl);

    window.__APP_CACHE_VERSION__ = APP_CACHE_VERSION;
  </script>
  <script type="module">
    const { SpotifyOrganizer } = await import(
      `./js/app.js?v=${window.__APP_CACHE_VERSION__}`
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(SpotifyOrganizer));
  </script>
</body>
</html>
